<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login – Aarav People Partners</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:linear-gradient(135deg,#0B1F3A 0%,#162d52 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-card{background:#fff;border-radius:18px;padding:48px 40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.3);}
    .logo{display:flex;align-items:center;gap:12px;margin-bottom:32px;justify-content:center;}
    .logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#0B1F3A,#162d52);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#C9A84C;font-size:1.4rem;font-weight:900;font-family:'Playfair Display',serif;}
    .logo-text{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#0B1F3A;line-height:1.2;}
    .logo-text small{display:block;font-size:0.72rem;font-family:'DM Sans',sans-serif;color:#C9A84C;font-weight:500;letter-spacing:0.5px;}
    h2{font-family:'Playfair Display',serif;color:#0B1F3A;margin-bottom:6px;font-size:1.4rem;}
    p.sub{color:#6b7280;font-size:0.88rem;margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    label{display:block;font-size:0.82rem;font-weight:600;color:#0B1F3A;margin-bottom:6px;}
    .input-wrap{position:relative;}
    .input-wrap i{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:#C9A84C;font-size:0.88rem;}
    input{width:100%;padding:11px 14px 11px 38px;border:1.5px solid #e5e7eb;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.92rem;outline:none;transition:border-color 0.2s;}
    input:focus{border-color:#C9A84C;box-shadow:0 0 0 3px rgba(201,168,76,0.12);}
    .btn{width:100%;padding:13px;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:0.95rem;font-weight:600;cursor:pointer;background:#C9A84C;color:#0B1F3A;margin-top:8px;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;}
    .btn:hover{background:#b8943e;transform:translateY(-1px);}
    .flash{padding:12px 16px;border-radius:8px;font-size:0.85rem;margin-bottom:16px;border-left:4px solid #dc2626;background:#fef2f2;color:#991b1b;}
    .footer-link{text-align:center;margin-top:20px;font-size:0.82rem;color:#6b7280;}
    .footer-link a{color:#C9A84C;font-weight:600;}
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">A</div>
    <div class="logo-text">Aarav People Partners<small>Admin Dashboard</small></div>
  </div>
  <h2>Welcome Back</h2>
  <p class="sub">Sign in to manage your HR platform.</p>

  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}{% for cat, msg in messages %}
    <div class="flash">{{ msg }}</div>
    {% endfor %}{% endif %}
  {% endwith %}

  <form method="POST">
    <div class="form-group">
      <label>Username</label>
      <div class="input-wrap"><i class="fa fa-user"></i><input type="text" name="username" placeholder="admin" required autofocus></div>
    </div>
    <div class="form-group">
      <label>Password</label>
      <div class="input-wrap"><i class="fa fa-lock"></i><input type="password" name="password" placeholder="••••••••" required></div>
    </div>
    <button type="submit" class="btn"><i class="fa fa-sign-in-alt"></i> Sign In</button>
  </form>
  <div class="footer-link"><a href="/">← Back to Website</a></div>
</div>
</body>
</html>

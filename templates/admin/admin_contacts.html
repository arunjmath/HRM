{% extends "admin/base_admin.html" %}

{% block page_title %}Contact Leads{% endblock %}

{% block content %}

<div class="table-card">

  <table>

    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Message</th>
      </tr>
    </thead>

    <tbody>

      {% for c in contacts %}
      <tr>

        <td>{{ c.name }}</td>
        <td>{{ c.email }}</td>
        <td>{{ c.message }}</td>

      </tr>
      {% endfor %}

    </tbody>

  </table>

</div>

{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0B1F3A;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .login-box{
      background:#fff;
      padding:40px;
      border-radius:10px;
      width:350px;
    }

    h2{
      margin-bottom:20px;
      color:#0B1F3A;
    }

    input{
      width:100%;
      padding:12px;
      margin-bottom:14px;
      border:1px solid #ddd;
    }

    button{
      width:100%;
      padding:12px;
      background:#C9A84C;
      border:none;
      font-weight:bold;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="login-box">

  <h2>Admin Login</h2>

  <form method="POST">

    <input type="text" name="username" placeholder="Username">

    <input type="password" name="password" placeholder="Password">

    <button type="submit">Login</button>

  </form>

</div>

</body>
</html>
